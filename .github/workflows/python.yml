name: Publish the images

on:
  push:
    branches:
      - main
    paths:
      - 'python/ubuntu*/Dockerfile_*'
      - 'python/base-images.json'
      - 'python/generate_dockerfile.sh'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'python/ubuntu*/Dockerfile_*'
      - 'python/base-images.json'
      - 'python/generate_dockerfile.sh'
      - '.github/actions/**'
      - '.github/workflows/python.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE_PREFIX: "quay.io/giskard/"

jobs:
  build:
    if: github.event_name == 'push'
    name: Build ${{ matrix.version }} variants on Ubuntu ${{ matrix.ubuntu.version }} (${{ matrix.platform }})
    strategy:
      matrix:
        version: ["3.12", "3.13", "3.14"]
        ubuntu:
          - version: "24.04"
            default: true
          - version: "26.04"
            default: false
        platform: ['ubuntu-latest', 'runner-ubuntu24-arm64']
      fail-fast: false
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read # clone repo
      id-token: write # OIDC token for Quay registry auth
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        id: builder
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Read Ubuntu base image
        id: ubuntu
        run: |
          set -euo pipefail
          image="$(jq -r --arg version "${UBUNTU_VERSION}" '.images[$version].image' python/base-images.json)"
          if [ "${image}" = "null" ] || [ -z "${image}" ]; then
            echo "No base image configured for Ubuntu ${UBUNTU_VERSION}" >&2
            exit 1
          fi
          echo "base_image=${image}" >> "$GITHUB_OUTPUT"
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu.version }}

      - name: Read Python patch version
        id: ver
        run: |
          pv=$(grep '^ENV PYTHON_VERSION ' "./python/ubuntu${UBUNTU_VERSION}/Dockerfile_${VERSION}" | awk '{print $3}')
          echo "python_patch=$pv" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ matrix.version }}
          UBUNTU_VERSION: ${{ matrix.ubuntu.version }}

      - name: Get Quay token via OIDC
        id: quay-token
        run: |
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=quay.io" | jq -r '.value')
          QUAY_TOKEN=$(curl -sS \
            --user "giskard+docker_images_ci:${OIDC_TOKEN}" \
            https://quay.io/oauth2/federation/robot/token | jq -r '.token')
          echo "::add-mask::${QUAY_TOKEN}"
          echo "token=${QUAY_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Login to Quay
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: giskard+docker_images_ci
          password: ${{ steps.quay-token.outputs.token }}

      - name: Build and push dev
        id: dev
        uses: ./.github/actions/build-python-variant
        with:
          version: ${{ matrix.version }}
          variant: dev
          ubuntu-version: ${{ matrix.ubuntu.version }}
          ubuntu-default: ${{ matrix.ubuntu.default }}
          python-patch: ${{ steps.ver.outputs.python_patch }}
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          ubuntu-base-image: ${{ steps.ubuntu.outputs.base_image }}
          platform-suffix: ${{ matrix.platform }}
          builder: ${{ steps.builder.outputs.name }}
          upload-digest: "true"

      - name: Build and push runtime
        id: runtime
        uses: ./.github/actions/build-python-variant
        with:
          version: ${{ matrix.version }}
          variant: runtime
          ubuntu-version: ${{ matrix.ubuntu.version }}
          ubuntu-default: ${{ matrix.ubuntu.default }}
          python-patch: ${{ steps.ver.outputs.python_patch }}
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          ubuntu-base-image: ${{ steps.ubuntu.outputs.base_image }}
          platform-suffix: ${{ matrix.platform }}
          builder: ${{ steps.builder.outputs.name }}
          upload-digest: "true"

  merge:
    if: github.event_name == 'push'
    name: Merge manifests (${{ matrix.version }}-${{ matrix.variant }} on Ubuntu ${{ matrix.ubuntu.version }})
    strategy:
      matrix:
        version: ["3.12", "3.13", "3.14"]
        variant: ["dev", "runtime"]
        ubuntu:
          - version: "24.04"
            default: true
          - version: "26.04"
            default: false
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read # clone repo
      id-token: write # OIDC token for Quay registry auth
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.version }}-${{ matrix.variant }}-ubuntu${{ matrix.ubuntu.version }}-*
          merge-multiple: true
          path: /tmp/digests/${{ matrix.version }}/${{ matrix.variant }}/ubuntu${{ matrix.ubuntu.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Read Python patch version
        id: ver
        run: |
          pv=$(grep '^ENV PYTHON_VERSION ' "./python/ubuntu${UBUNTU_VERSION}/Dockerfile_${VERSION}" | awk '{print $3}')
          echo "python_patch=$pv" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ matrix.version }}
          VARIANT: ${{ matrix.variant }}
          UBUNTU_VERSION: ${{ matrix.ubuntu.version }}

      - name: Image metadata
        id: meta
        uses: ./.github/actions/python-image-metadata
        with:
          version: ${{ matrix.version }}
          variant: ${{ matrix.variant }}
          ubuntu-version: ${{ matrix.ubuntu.version }}
          ubuntu-default: ${{ matrix.ubuntu.default }}
          python-patch: ${{ steps.ver.outputs.python_patch }}
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}

      - name: Get Quay token via OIDC
        id: quay-token
        run: |
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=quay.io" | jq -r '.value')
          QUAY_TOKEN=$(curl -sS \
            --user "giskard+docker_images_ci:${OIDC_TOKEN}" \
            https://quay.io/oauth2/federation/robot/token | jq -r '.token')
          echo "::add-mask::${QUAY_TOKEN}"
          echo "token=${QUAY_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Login to Quay
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: giskard+docker_images_ci
          password: ${{ steps.quay-token.outputs.token }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/${{ matrix.version }}/${{ matrix.variant }}/ubuntu${{ matrix.ubuntu.version }}
        run: |
          docker buildx imagetools create $(awk '{ printf "-t %s ", $0 }' "${TAGS_FILE}") \
            $(printf "${REGISTRY_IMAGE_PREFIX}python@sha256:%s " *)
        env:
          TAGS_FILE: ${{ steps.meta.outputs['tags-file'] }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE_PREFIX}python:${META_VERSION}"
        env:
          META_VERSION: ${{ steps.meta.outputs.version }}

  verify-pr:
    name: Verify PR image flow (${{ matrix.version }} variants on Ubuntu ${{ matrix.ubuntu.version }} / ${{ matrix.platform.name }})
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      matrix:
        version: ["3.12", "3.13", "3.14"]
        ubuntu:
          - version: "24.04"
            default: true
          - version: "26.04"
            default: false
        platform:
          - name: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
            docker: linux/amd64
          - name: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
            docker: linux/arm64
      fail-fast: false
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read # clone repo
      id-token: write # OIDC token for keyless signing
      attestations: write # generate provenance attestations
      security-events: write # upload Trivy SARIF results for trusted PRs
    services:
      registry:
        image: registry:3@sha256:85347ed2ecde64161c7a4788a4d7d3dcc9d6f86f7be95834022e3c6a423a945a # v2
        ports:
          - 5000:5000
    env:
      REGISTRY_IMAGE_PREFIX: "localhost:5000/giskard/"
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        id: builder
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver-opts: network=host

      - name: Read Ubuntu base image
        id: ubuntu
        run: |
          set -euo pipefail
          image="$(jq -r --arg version "${UBUNTU_VERSION}" '.images[$version].image' python/base-images.json)"
          if [ "${image}" = "null" ] || [ -z "${image}" ]; then
            echo "No base image configured for Ubuntu ${UBUNTU_VERSION}" >&2
            exit 1
          fi
          echo "base_image=${image}" >> "$GITHUB_OUTPUT"
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu.version }}

      - name: Read Python patch version
        id: ver
        run: |
          pv=$(grep '^ENV PYTHON_VERSION ' "./python/ubuntu${UBUNTU_VERSION}/Dockerfile_${VERSION}" | awk '{print $3}')
          echo "python_patch=$pv" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ matrix.version }}
          UBUNTU_VERSION: ${{ matrix.ubuntu.version }}

      - name: Build and push dev to local registry
        id: dev
        uses: ./.github/actions/build-python-variant
        with:
          version: ${{ matrix.version }}
          variant: dev
          ubuntu-version: ${{ matrix.ubuntu.version }}
          ubuntu-default: ${{ matrix.ubuntu.default }}
          python-patch: ${{ steps.ver.outputs.python_patch }}
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          ubuntu-base-image: ${{ steps.ubuntu.outputs.base_image }}
          platform-suffix: ${{ matrix.platform.name }}
          docker-platform: ${{ matrix.platform.docker }}
          builder: ${{ steps.builder.outputs.name }}

      - name: Inspect dev image
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE_PREFIX}python:${META_VERSION}"
        env:
          META_VERSION: ${{ steps.dev.outputs.version }}

      - name: Build and push runtime to local registry
        id: runtime
        uses: ./.github/actions/build-python-variant
        with:
          version: ${{ matrix.version }}
          variant: runtime
          ubuntu-version: ${{ matrix.ubuntu.version }}
          ubuntu-default: ${{ matrix.ubuntu.default }}
          python-patch: ${{ steps.ver.outputs.python_patch }}
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          ubuntu-base-image: ${{ steps.ubuntu.outputs.base_image }}
          platform-suffix: ${{ matrix.platform.name }}
          docker-platform: ${{ matrix.platform.docker }}
          builder: ${{ steps.builder.outputs.name }}

      - name: Inspect runtime image
        run: |
          docker buildx imagetools inspect "${REGISTRY_IMAGE_PREFIX}python:${META_VERSION}"
        env:
          META_VERSION: ${{ steps.runtime.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.71.0

      - name: Verify dev local registry image
        uses: ./.github/actions/verify-python-registry-image
        with:
          variant: dev
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          tags-file: ${{ steps.dev.outputs['tags-file'] }}
          digest: ${{ steps.dev.outputs.digest }}
          platform: ${{ matrix.platform.docker }}
          certificate-identity-regexp: ^https://github\.com/Giskard-AI/docker-images/\.github/workflows/python\.yml@refs/pull/[0-9]+/merge$
          certificate-oidc-issuer: https://token.actions.githubusercontent.com
          trivy-distro: ubuntu/${{ matrix.ubuntu.version }}
          sarif-category: pr-python-${{ matrix.version }}-dev-ubuntu${{ matrix.ubuntu.version }}-${{ matrix.platform.name }}

      - name: Verify runtime local registry image
        uses: ./.github/actions/verify-python-registry-image
        with:
          variant: runtime
          registry-image-prefix: ${{ env.REGISTRY_IMAGE_PREFIX }}
          tags-file: ${{ steps.runtime.outputs['tags-file'] }}
          digest: ${{ steps.runtime.outputs.digest }}
          platform: ${{ matrix.platform.docker }}
          certificate-identity-regexp: ^https://github\.com/Giskard-AI/docker-images/\.github/workflows/python\.yml@refs/pull/[0-9]+/merge$
          certificate-oidc-issuer: https://token.actions.githubusercontent.com
          trivy-distro: ubuntu/${{ matrix.ubuntu.version }}
          sarif-category: pr-python-${{ matrix.version }}-runtime-ubuntu${{ matrix.ubuntu.version }}-${{ matrix.platform.name }}
