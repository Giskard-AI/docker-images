name: Update python dockerfile

on:
    schedule:
    - cron: '0 4 * * *'
    workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update:
    name: Update Dockerfiles
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: read # clone repo (app token handles write operations)
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Update Ubuntu base image digests
        id: update_ubuntu
        working-directory: python
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          cp base-images.json "${tmp}"

          for version in 24.04 26.04; do
            digest="$(docker buildx imagetools inspect "ubuntu:${version}" --format '{{.Digest}}')"
            if ! printf '%s\n' "${digest}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
              echo "Failed to parse ubuntu:${version} digest" >&2
              exit 1
            fi
            image="ubuntu:${version}@${digest}"
            jq --arg version "${version}" --arg image "${image}" \
              '.images[$version] = $image' "${tmp}" > "${tmp}.next"
            mv "${tmp}.next" "${tmp}"
          done

          if cmp -s base-images.json "${tmp}"; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            mv "${tmp}" base-images.json
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

          rm -f "${tmp}" "${tmp}.next"

      - name: Try to update dockerfile
        working-directory: python
        run: |
          bash generate_dockerfile.sh

      - name: Verify Ubuntu digest is pinned in Dockerfiles
        run: |
          set -euo pipefail
          jq -e '.default == "24.04"' python/base-images.json
          jq -e '.images["24.04"] | test("^ubuntu:24\\.04@sha256:[0-9a-f]{64}$")' python/base-images.json
          jq -e '.images["26.04"] | test("^ubuntu:26\\.04@sha256:[0-9a-f]{64}$")' python/base-images.json
          for f in python/Dockerfile_*; do
            echo "Checking $f"
            grep -q '^ARG UBUNTU_BASE_IMAGE=ubuntu:24\.04@sha256:' "$f"
            grep -q '^FROM ${UBUNTU_BASE_IMAGE}$' "$f"
          done

      - name: Generate automation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create Pull Request # zizmor: ignore[superfluous-actions]
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Updating to latest python version and ubuntu base digest
          add-paths: |
            python/Dockerfile_*
            python/base-images.json
            python/generate_dockerfile.sh
          branch: cron-python-update
          title: Updating to latest python version and ubuntu base digest
          assignees: Hartorn
          token: ${{ steps.app-token.outputs.token }}
